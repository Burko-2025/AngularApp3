<div class="form-container">
  <h2>Register</h2>
  <button class="btn btn-outline-primary" routerLink="/login">Login</button>

  <form #regForm="ngForm" (ngSubmit)="register(regForm)" novalidate>
    <div class="form-group">
      <label for="userName">Username</label>
      <input type="text" id="userName" name="userName" [(ngModel)]="userName" required />
      <div *ngIf="regForm.submitted && !userName" class="error">Username is required</div>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" [(ngModel)]="password" required minlength="6" />
      <div *ngIf="regForm.submitted && !password" class="error">Password is required</div>
    </div>
    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword" required minlength="6" />
      <div *ngIf="regForm.submitted && !confirmPassword" class="error">Confirm password is required</div>
      <div *ngIf="confirmPassword && password != confirmPassword" class="error">Passwords do not match</div>
    </div>
    <div class="form-group">
      <label for="emailAddress">Email Address</label>
      <input type="email" id="emailAddress" name="emailAddress" [(ngModel)]="emailAddress" required />
      <div *ngIf="regForm.submitted && !emailAddress" class="error">Email address is required</div>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="regForm.invalid || password != confirmPassword">Register</button>

    <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="success" *ngIf="successMessage">{{ successMessage }}</div>

  </form>
</div>
